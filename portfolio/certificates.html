<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="All certificates — Tyreik Rogers portfolio.">
    <title>All certificates · Tyreik Rogers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="page page--onecol page--ref page--projects-all">
    <main>
        <section class="section section--tight section-anchor reveal-group">
            <div class="container">
                <p class="projects-all__back reveal">
                    <a class="projects-all__back-link" href="index.html?tab=certificates#projects">← Back to portfolio</a>
                </p>
                <header class="showcase-header reveal">
                    <h1 class="section__title section__title--showcase">All certificates</h1>
                    <p class="section__lead section__lead--center">Credentials from programs and partners.</p>
                </header>

                <div class="card-grid reveal-stagger showcase-cert-grid">
                    <article class="cert-card cert-card--image">
                        <a class="cert-card__media" href="../images/certifications/codenext.jpg" target="_blank" rel="noopener">
                            <img src="../images/certifications/codenext.jpg" alt="Code Next certificate of completion — Google" width="480" height="360" loading="lazy" decoding="async">
                        </a>
                    </article>
                    <article class="cert-card cert-card--image">
                        <a class="cert-card__media" href="../images/certifications/teamedge.jpg" target="_blank" rel="noopener">
                            <img src="../images/certifications/teamedge.jpg" alt="TeamEdge certificate of completion — Google" width="480" height="360" loading="lazy" decoding="async">
                        </a>
                    </article>
                    <article class="cert-card cert-card--image">
                        <a class="cert-card__media" href="../images/certifications/tfl.jpg" target="_blank" rel="noopener">
                            <img src="../images/certifications/tfl.jpg" alt="Tech Flex Leaders certificate of completion — America On Tech" width="480" height="303" loading="lazy" decoding="async">
                        </a>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container site-footer__inner">
            <p>© <span id="y"></span> Tyreik Rogers</p>
            <p class="site-footer__links"><a href="index.html#home">Home</a> · <a href="index.html#projects">Portfolio</a> · <a href="index.html#contact">Contact</a></p>
        </div>
    </footer>
    <script src="../js/main.js"></script>
    <script>
        document.getElementById("y").textContent = new Date().getFullYear();
    </script>
</body>

</html>
