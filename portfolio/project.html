<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Project details — Tyreik Rogers portfolio.">
    <title>Project · Tyreik Rogers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="page page--onecol page--ref page--project-detail">
    <div class="project-detail-page">
        <header class="project-detail__top">
            <div class="container project-detail__top-inner">
                <a class="project-detail__back" href="index.html#projects">
                    <span class="project-detail__back-icon" aria-hidden="true">←</span>
                    Back
                </a>
            </div>
        </header>

        <main class="project-detail__main">
            <div class="container">
                <article id="project-detail-article" class="project-detail" hidden>
                    <div class="project-detail__grid">
                        <div class="project-detail__col project-detail__col--copy">
                            <h1 class="project-detail__title" id="pd-title">Project</h1>
                            <p class="project-detail__desc" id="pd-desc"></p>

                            <div class="project-detail__stats" aria-label="Project stats">
                                <div class="project-detail__stat-card">
                                    <div class="project-detail__stat-card__top">
                                        <span class="project-detail__stat-card__icon" aria-hidden="true">{ }</span>
                                        <span class="project-detail__stat-card__num" id="pd-stat-tech">0</span>
                                    </div>
                                    <p class="project-detail__stat-card__label">Technologies</p>
                                </div>
                                <div class="project-detail__stat-card">
                                    <div class="project-detail__stat-card__top">
                                        <span class="project-detail__stat-card__icon" aria-hidden="true">▤</span>
                                        <span class="project-detail__stat-card__num" id="pd-stat-features">0</span>
                                    </div>
                                    <p class="project-detail__stat-card__label">Key features</p>
                                </div>
                            </div>

                            <div class="project-detail__actions" id="pd-actions">
                                <a class="project-detail__btn project-detail__btn--live" id="pd-live" href="#" target="_blank" rel="noopener" hidden>
                                    <svg class="project-detail__btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                                        <polyline points="15 3 21 3 21 9" />
                                        <line x1="10" y1="14" x2="21" y2="3" />
                                    </svg>
                                    Live demo
                                </a>
                                <a class="project-detail__btn project-detail__btn--github" id="pd-github" href="#" target="_blank" rel="noopener" hidden>
                                    <svg class="project-detail__btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                                    </svg>
                                    GitHub
                                </a>
                            </div>

                            <section class="project-detail__tech-block" aria-labelledby="pd-tech-heading">
                                <h2 class="project-detail__tech-heading" id="pd-tech-heading">
                                    <span class="project-detail__tech-heading-icon" aria-hidden="true">&lt;/&gt;</span>
                                    Technologies used
                                </h2>
                                <ul class="project-detail__tech-list" id="pd-tech-list"></ul>
                            </section>
                        </div>

                        <div class="project-detail__col project-detail__col--visual">
                            <figure class="project-detail__figure">
                                <img id="pd-image" class="project-detail__image" src="" alt="" width="960" height="540" loading="eager" decoding="async">
                            </figure>
                            <section class="project-detail__features-box" aria-labelledby="pd-features-heading">
                                <h2 class="project-detail__features-title" id="pd-features-heading">
                                    <svg class="project-detail__star" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#facc15" stroke-width="1.75" aria-hidden="true">
                                        <polygon points="12 2 15 9 22 9 17 14 19 22 12 18 5 22 7 14 2 9 9 9 12 2" />
                                    </svg>
                                    Key features
                                </h2>
                                <ul class="project-detail__features-ul" id="pd-features"></ul>
                            </section>
                        </div>
                    </div>
                </article>

                <div id="project-detail-not-found" class="project-detail__not-found" hidden>
                    <p class="project-detail__not-found-text">This project could not be found.</p>
                    <a class="project-detail__not-found-link" href="index.html#projects">Back to portfolio</a>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/project-detail.js" defer></script>
</body>

</html>
